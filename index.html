<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Pintar - Rico & Team</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loader-content">
    <div class="cyber-spinner"></div>
    <div class="loading-text">
      <span class="letter">L</span>
      <span class="letter">O</span>
      <span class="letter">A</span>
      <span class="letter">D</span>
      <span class="letter">I</span>
      <span class="letter">N</span>
      <span class="letter">G</span>
    </div>
    <p class="loading-sub">Initializing System Information...</p>
  </div>
</div>

<!-- NOTIFIKASI -->
<div id="custom-notification" class="notif-hidden"></div>

<!-- MODAL -->
<div id="customModal" class="modal-overlay">
  <div class="modal-content">
    <i class="fa-solid fa-circle-exclamation modal-icon"></i>
    <h3>Konfirmasi Hapus</h3>
    <p>Apakah kamu yakin ingin menghapus semua riwayat di storage?</p>
    <div class="modal-buttons">
      <button onclick="closeModal()" class="btn-modal-cancel">Batal</button>
      <button id="confirmDeleteBtn" class="btn-modal-confirm">Ya, Hapus!</button>
    </div>
  </div>
</div>

<!-- THEME TOGGLE -->
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle Mode Terang/Gelap" id="themeBtn">
  <i class="fa-solid fa-sun" id="themeIcon"></i>
</button>

<!-- FOLDER ICON -->
<div class="folder-history" onclick="toggleSavedPanel()" title="Buka Riwayat Tersimpan">
  <i class="fa-solid fa-folder-tree"></i>
</div>

<!-- STORAGE PANEL -->
<div id="savedPanel" class="saved-panel">
  <div class="panel-header">
    <h3><i class="fa-solid fa-hard-drive"></i> Storage</h3>
    <button onclick="toggleSavedPanel()" class="close-panel">&times;</button>
  </div>
  <div class="panel-content">
    <ul id="daftarSaved"></ul>
    <button onclick="openModal()" class="btn-clear-all">Kosongkan Storage</button>
  </div>
</div>

<!-- HEADER -->
<div class="header-wrapper">
  <h1 class="rgb-text">
    <i class="fa-solid fa-microchip"></i>
    <span>KALKULATOR PINTAR</span>
  </h1>
  <p class="sub-title">Sistem Informasi Edition</p>
</div>

<!-- MAIN -->
<main>
  <div class="kalkulator-card">
    <div class="display-container">
      <div class="input-wrapper">
        <input type="number" id="angka1" placeholder="0">
        <span class="operator-display" id="opSymbol">?</span>
        <input type="number" id="angka2" placeholder="0">
      </div>
      <div class="hasil-box">
        <h2 id="displayHasil">0</h2>
      </div>
    </div>

    <div class="button-grid">
      <button class="btn-op" onclick="hitung('tambah')"><i class="fa-solid fa-plus"></i></button>
      <button class="btn-op" onclick="hitung('kurang')"><i class="fa-solid fa-minus"></i></button>
      <button class="btn-op" onclick="hitung('kali')"><i class="fa-solid fa-xmark"></i></button>
      <button class="btn-op" onclick="hitung('bagi')"><i class="fa-solid fa-divide"></i></button>
      <button class="btn-reset" onclick="resetKalkulator()"><i class="fa-solid fa-trash-can"></i></button>
    </div>

    <div class="riwayat-container">
      <div class="riwayat-header">
        <span class="riwayat-label"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Sesi</span>
        <div class="header-actions">
          <button onclick="simpanKeStorage()" class="btn-action-save">Simpan</button>
          <button onclick="hapusRiwayat()" class="btn-action-delete">Hapus</button>
        </div>
      </div>
      <ul id="daftarRiwayat"></ul>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="team-badges">
    <span class="badge"><i class="fa-solid fa-user"></i> Rico - 2247101177</span>
    <span class="badge"><i class="fa-solid fa-user"></i> Khosyi - 2247101161</span>
    <span class="badge"><i class="fa-solid fa-user"></i> Andy - 2247101179</span>
  </div>
</footer>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

<script src="script.js"></script>
</body>
</html>
